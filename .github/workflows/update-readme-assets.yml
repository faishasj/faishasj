name: Update README assets

on:
  schedule:
    - cron: "17 6 * * *"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: update-readme-assets
  cancel-in-progress: true

jobs:
  generate:
    runs-on: ubuntu-latest
    env:
      GITHUB_CONTRIBUTION_USERNAME: ${{ github.repository_owner }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: python -m pip install --upgrade pip && python -m pip install -r requirements.txt

      - name: Regenerate README assets
        run: python -m generator

      - name: Commit changed assets
        run: |
          if git diff --quiet --exit-code -- assets/contribution-life-light.gif assets/contribution-life-dark.gif; then
            echo "No asset changes detected; skipping commit."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add assets/contribution-life-light.gif assets/contribution-life-dark.gif
          git commit -m "Regenerate README assets"
          git push
